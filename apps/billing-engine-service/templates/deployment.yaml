apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/part-of: billings
    gobots.io/component: {{ .Values.component }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/part-of: billings
    spec:
      containers:
        - name: app
          image: {{ .Values.image }}
          args: ["--port", "{{ .Values.port }}", "--name", "{{ .Values.name }}"]
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
